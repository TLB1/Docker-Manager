{% extends "base.html" %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
  <div class="card bg-dark border-secondary shadow text-center" style="max-width: 480px; width: 100%;">
    <div class="card-body p-5">

      <div id="icon" class="display-4 mb-3">⚠️</div>
      <h1 class="h4 fw-bold text-light mb-2" id="heading">Challenge Unavailable</h1>
      <p class="text-secondary mb-4" id="subtitle">Loading container status…</p>

      <div id="status-badge-wrap" class="mb-3"></div>
      <div id="action-wrap" class="mb-3"></div>

      <div id="progress-wrap" class="progress mb-3" style="height: 6px; display: none !important;">
        <div id="progress-bar"
             class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
             role="progressbar"
             style="width: 0%">
        </div>
      </div>

      <div id="msg" class="small text-secondary mt-2" style="min-height: 1.25rem;"></div>

    </div>
  </div>
</div>

<span id="page-meta"
      data-token="{{ token }}"
      data-ctfd-root="{{ ctfd_root }}"
      data-ctfd-domain="{{ ctfd_domain }}"
      data-csrf="{{ Session.nonce }}"
      style="display:none;"></span>
<script src="/plugins/Docker-Manager/assets/challenge_unavailable.js"></script>
{% endblock %}
