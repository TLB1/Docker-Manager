user nginx;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}

http {

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        server_tokens off; # Recommended practice is to turn this off

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ssl_protocols TLSv1.2 TLSv1.3; # Dropping SSLv3 (POODLE), TLS 1.0, 1.1
        ssl_prefer_server_ciphers off; # Don't force server cipher order.

        access_log /var/log/nginx/access.log;
        gzip on;

        ##
        # Virtual Host Configs
        ##

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;

        # Add the token map here
        map $host $token {
            # regex capture: host like <token>.ctfd-debian
            ~^([a-f0-9]+)\.challenges.ctf$ $1;
            default "";
        }
     resolver 127.0.0.11 valid=10s ipv6=off;
# Include map token -> backend
include /etc/nginx/data/token_map.conf;

server {
    listen 8008;
    # Accept any subdomain
    server_name  *.challenges.ctf;

    location / {
        if ($backend = "") {
            return 302 http://challenges.ctf/challenge-unavailable/404;
        }

        # Fire a background keepalive ping to CTFd on every request — non-blocking
        mirror /challenge-keepalive;
        mirror_request_body off;

        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 =302 http://challenges.ctf/challenge-unavailable/$token;
    }

    # Internal mirror target — proxies to CTFd keepalive endpoint
    location = /challenge-keepalive {
        internal;
        proxy_pass http://challenges.ctf/docker/api/token/$token/keepalive;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ignore_client_abort on;
        charset off;
    }
}

}