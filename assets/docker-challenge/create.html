{% extends "admin/challenges/create.html" %}
{% block name %}
<div class="form-group">
  <label>
    Name:<br>
    <small class="form-text text-muted">The name of your challenge</small>
  </label>
  <input type="text" class="form-control" name="name" placeholder="Enter challenge name">
</div>

<div class="form-group mt-4">
  <hr>
  <div class="form-check form-switch mb-3">
    <input class="form-check-input" type="checkbox" id="use_challenge_network"
           name="use_challenge_network" value="on" checked>
    <label class="form-check-label" for="use_challenge_network">
      Enable seperate challenge networks
      <small class="text-muted d-block">
        Connects all containers to a shared Docker bridge network so they can
        reach each other. Disable for single-container challenges if they don't need to be isolated.
      </small>
    </label>
  </div>
</div>

<div class="form-group mt-4">
  <hr>
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <label class="form-label mb-0">Containers</label>
      <small class="form-text text-muted d-block">Each container runs one image and exposes one or more ports.</small>
    </div>
    <button type="button" class="btn btn-sm btn-outline-primary" id="add-container-btn">+ Add Container</button>
  </div>

  <div id="containers-list"></div>

  <div id="no-containers-msg" class="text-center text-muted py-3 border rounded">
    No containers added yet. Click <strong>+ Add Container</strong> to begin.
  </div>
</div>

<input type="hidden" id="docker_containers_json" name="docker_containers_json" value="[]">
<span id="create-meta"
      data-upload-url="{{ url_for('docker_image_challenge.upload_docker_image') }}"
      data-images-url="{{ url_for('docker_image_challenge.admin_list_registry_images') }}"
      style="display:none;"></span>

<!-- ─── Card template ─────────────────────────────────────────────────── -->
<template id="container-card-tpl">
  <div class="card mb-3 container-card">

    <div class="card-header d-flex align-items-center justify-content-between py-2">
      <span class="fw-semibold small text-muted">Container #<span class="card-index"></span></span>
      <button type="button" class="btn btn-sm btn-outline-danger remove-container-btn">Remove</button>
    </div>

    <div class="card-body">

      <!-- Label -->
      <div class="mb-3">
        <label class="form-label">Label <small class="text-muted">(optional)</small></label>
        <input type="text" class="form-control container-label" placeholder="e.g. Web Server, Database">
      </div>

      <!-- Image source -->
      <div class="mb-3">
        <label class="form-label">Image Source</label>
        <div class="btn-group d-flex mb-3" style="max-width:320px;" role="group">
          <button type="button" class="btn btn-sm btn-outline-secondary source-tab active w-50" data-source="tar">
            Upload .tar
          </button>
          <button type="button" class="btn btn-sm btn-outline-secondary source-tab w-50" data-source="registry">
            From Registry
          </button>
        </div>

        <!-- TAR panel -->
        <div class="source-panel source-panel-tar">
          <div class="d-flex align-items-center gap-2 mb-2">
            <input type="file" class="form-control container-tar-input" accept=".tar" style="max-width:360px;">
            <button type="button" class="btn btn-sm btn-secondary container-upload-btn" disabled>Upload</button>
          </div>
          <div class="upload-progress-wrap mb-2" style="display:none; max-width:360px;">
            <div class="progress" style="height:18px;">
              <div class="progress-bar progress-bar-striped progress-bar-animated upload-progress-bar"
                   role="progressbar" style="width:0%">0%</div>
            </div>
          </div>
          <div class="upload-status"></div>
          <input type="hidden" class="container-image-filename">
        </div>

        <!-- Registry panel -->
        <div class="source-panel source-panel-registry" style="display:none;">
          <div class="d-flex align-items-center gap-2" style="max-width:420px;">
            <select class="form-select container-image-name">
              <option value="">— loading images… —</option>
            </select>
            <button type="button" class="btn btn-sm btn-outline-secondary registry-refresh-btn"
                    title="Refresh image list">↻</button>
          </div>
          <small class="form-text text-muted">Images currently available on the Docker host(s).</small>
        </div>
      </div>

      <!-- Port mappings -->
      <div class="mb-2">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <label class="form-label mb-0">Port Mappings</label>
          <button type="button" class="btn btn-sm btn-outline-secondary add-port-btn">+ Add Port</button>
        </div>
        <div class="port-mappings-list">
          <!-- Port rows injected here -->
        </div>
        <div class="no-ports-msg text-muted small fst-italic">No ports added yet.</div>
      </div>

    </div>
  </div>
</template>

<!-- ─── Port row template ─────────────────────────────────────────────── -->
<template id="port-row-tpl">
  <div class="port-row d-flex align-items-center gap-2 mb-2 flex-wrap">
    <input type="number" class="form-control port-number"
           placeholder="Port" min="1" max="65535" style="max-width:110px;">
    <input type="text" class="form-control port-label"
           placeholder="Label (e.g. HTTP, Shell)" style="max-width:200px;">
    <div class="btn-group btn-group-sm" role="group" title="Protocol type">
      <button type="button" class="btn btn-outline-secondary port-proto-btn active"
              data-proto="http">HTTP</button>
      <button type="button" class="btn btn-outline-secondary port-proto-btn"
              data-proto="tcp">TCP</button>
    </div>
    <input type="hidden" class="port-http-value" value="true">
    <button type="button" class="btn btn-sm btn-outline-danger remove-port-btn">✕</button>
  </div>
</template>

{% endblock %}

{% block type %}
<input type="hidden" name="type" value="docker" id="chaltype">
{% endblock %}
