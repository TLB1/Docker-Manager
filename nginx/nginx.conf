user nginx;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}

http {

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        server_tokens off; # Recommended practice is to turn this off

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ssl_protocols TLSv1.2 TLSv1.3; # Dropping SSLv3 (POODLE), TLS 1.0, 1.1
        ssl_prefer_server_ciphers off; # Don't force server cipher order.

        access_log /var/log/nginx/access.log;
        gzip on;

        ##
        # Virtual Host Configs
        ##

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;

        # Add the token map here
        map $host $token {
            # regex capture: host like <token>.ctfd-debian
            ~^([a-f0-9]+)\.challenges.ctf$ $1;
            default "";
        }

# 2) Include map token -> backend
include /etc/nginx/data/token_map.conf;

server {
    listen 8008;
    # Accept any subdomain
    server_name  *.challenges.ctf;

    location / {
        # return 404 if token not known
        if ($backend = "") {
            return 404;
        }

        # Proxy to mapped backend
        proxy_pass http://$backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}