{% extends "admin/challenges/update.html" %}
{% block name %}
<div class="form-group">
		<label>
			Name:<br>
			<small class="form-text text-muted">
				The name of your challenge
			</small>
		</label>
		<input type="text" class="form-control" name="name" placeholder="Enter challenge name">
	</div>
<div class="form-group">
    <hr>
    <div class="mb-3">
      <label class="form-label">Upload Docker image: (.tar)</label>
      <small class="form-text text-muted">Upload the exported docker image as a .tar file</small>
      <input type="file" class="form-control" id="image-tar-input" accept=".tar">
    </div> 
  </div> 

  <input type="hidden" name="docker_image_filename" id="docker_image_filename">
</div>
{% endblock %}
