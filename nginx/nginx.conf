user nginx;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    access_log /var/log/nginx/access.log;
    gzip on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    map $host $token {
        "~^([a-f0-9]{12})\." $1;
        default "";
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Loads both $backend and $ctfd_host maps
    include /etc/nginx/data/data_map.conf;

    server {
        listen 8008;
        include /etc/nginx/data/server_name.conf;

        location / {
            if ($backend = "") {
                return 302 http://$ctfd_host/challenge-unavailable/404;
            }
            mirror /challenge-keepalive;
            mirror_request_body off;
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 502 =302 http://$ctfd_host/challenge-unavailable/$token;
        }

        location = /challenge-keepalive {
            internal;
            proxy_pass http://$ctfd_host/docker/api/token/$token/keepalive;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ignore_client_abort on;
            charset off;
        }
    }
}